<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Form</title>
    <link rel="stylesheet" href="styles.css"/>
    <script src="scripts.js" defer></script>
</head>
<body>
    <main>
        <section class = "errors"></section>
        <form id = "cardForm">
            <div class = "card-container">

                <!-- BACK CARD -->
                 <div class = "card back">
                    <div class="black-strip"></div>
                    <div class = "cvc-area">
                        <label for = "cvc">CVC/CVV</label>
                        <input type="text" id = "cvc" maxlength="3" placeholder="XXX">
                    </div>
                 </div>
                 
                 <!-- FRONT CARD -->
                <div class = "card front">
                        <span class = "total">Total: $199</span>
                        <span class = "card-icon">💳</span>
                    <div class = "card-number">
                        <label for = "cardNumber">CARD NUMBER</label>
                        <input type="text" id = "cardNumber" maxlength="16" placeholder="1234 5678 9101 1020"/>
                    </div>
                        <div class = "card-holder">
                            <label for="cardHolder">CARD HOLDER</label>
                            <input type="text" id = "cardHolder" placeholder="John Doe"/>
                        </div>
                        <div class = "card-expiration">
                            <label id = "expirationDate">EXPIRATION</label>
                            <input type = "text" id = "month" name = "expmonth" placeholder = "MM" aria-labelledby = "expirationDate">
                            <input type = "text" id = "year" name = "expyear" placeholder = "YY" aria-labelledby = "expirationDate"/>
                        </div> 
                </div>
            </div>
            <button type="submit">Submit</button>
        </form>
    </main>
</body>
</html>
